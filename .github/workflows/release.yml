name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PORTABLE_NODE_VERSION: 24.18.0

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Test and build backend
        working-directory: backend
        run: |
          npm ci
          npm test
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          printf 'VITE_API_URL=\nVITE_API_KEY=\n' > .env
          npm run build

      - name: Audit production dependencies
        run: |
          cd backend && npm audit --omit=dev --audit-level=high
          cd ../frontend && npm audit --omit=dev --audit-level=high

      - name: Assemble portable Windows release
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p release/runtime release/backend release/frontend

          curl --fail --location --silent --show-error \
            --output node-win-x64.zip \
            "https://nodejs.org/dist/v${PORTABLE_NODE_VERSION}/node-v${PORTABLE_NODE_VERSION}-win-x64.zip"
          unzip -q node-win-x64.zip
          cp "node-v${PORTABLE_NODE_VERSION}-win-x64/node.exe" release/runtime/node.exe
          cp "node-v${PORTABLE_NODE_VERSION}-win-x64/LICENSE" release/runtime/NODE-LICENSE.txt

          cp -r backend/dist release/backend/dist
          cp backend/package.json backend/package-lock.json release/backend/
          npm ci --omit=dev --prefix release/backend

          cp -r frontend/dist release/frontend/dist
          cp -r config release/config
          cp "Start Vantage.bat" release/
          cp README.md release/
          printf 'GROQ_API_KEY=%s\nAI_DATA_CONSENT=true\n' "$GROQ_API_KEY" > release/.env

      - name: Create ZIP and checksum
        run: |
          cd release
          zip -r "../vantage-${{ github.ref_name }}.zip" .
          cd ..
          sha256sum "vantage-${{ github.ref_name }}.zip" > "vantage-${{ github.ref_name }}.zip.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vantage-${{ github.ref_name }}.zip
            vantage-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
          body: |
            ## Download Vantage ${{ github.ref_name }}

            1. Download **`vantage-${{ github.ref_name }}.zip`**
            2. Optionally verify it against the included `.sha256` checksum
            3. Extract the ZIP completely
            4. Double-click **`Start Vantage.bat`**
            5. Complete the first-run setup wizard

            No Node.js, Docker, installer, or packed executable is required. The release
            contains the official Node.js Windows runtime and normal application files.
            AI features work out of the box — no extra setup needed.

            ### Or install as a desktop app
            Download **`Vantage-Setup-${{ github.ref_name }}.exe`** for a proper Windows installer
            with a Start Menu shortcut and system-tray integration.

  electron:
    runs-on: windows-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          printf 'VITE_API_URL=\nVITE_API_KEY=\n' > .env
          npm run build

      - name: Package Electron installer
        working-directory: electron
        shell: bash
        run: |
          npm install
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          npm run dist

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.exe

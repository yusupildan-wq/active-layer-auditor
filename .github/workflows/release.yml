name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.3.0) — leave blank to auto-bump patch'
        required: false

permissions:
  contents: write

env:
  PORTABLE_NODE_VERSION: 24.18.0

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release trigger
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          INPUT="${{ github.event.inputs.version }}"
          if [[ "$MSG" == *"[release]"* || -n "$INPUT" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve version tag
        id: version
        if: steps.check.outputs.proceed == 'true'
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
          else
            LATEST=$(git tag --sort=-version:refname | grep '^v' | head -1)
            if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
            IFS='.' read -r major minor patch <<< "${LATEST#v}"
            TAG="v${major}.${minor}.$((patch + 1))"
          fi
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: steps.check.outputs.proceed == 'true'
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Test and build backend
        if: steps.check.outputs.proceed == 'true'
        working-directory: backend
        run: |
          npm ci
          npm test
          npm run build

      - name: Build frontend
        if: steps.check.outputs.proceed == 'true'
        working-directory: frontend
        run: |
          npm ci
          printf 'VITE_API_URL=\nVITE_API_KEY=\n' > .env
          npm run build

      - name: Audit production dependencies
        if: steps.check.outputs.proceed == 'true'
        run: |
          cd backend && npm audit --omit=dev --audit-level=high
          cd ../frontend && npm audit --omit=dev --audit-level=high

      - name: Assemble portable Windows release
        if: steps.check.outputs.proceed == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p release/runtime release/backend release/frontend

          curl --fail --location --silent --show-error \
            --output node-win-x64.zip \
            "https://nodejs.org/dist/v${PORTABLE_NODE_VERSION}/node-v${PORTABLE_NODE_VERSION}-win-x64.zip"
          unzip -q node-win-x64.zip
          cp "node-v${PORTABLE_NODE_VERSION}-win-x64/node.exe" release/runtime/node.exe
          cp "node-v${PORTABLE_NODE_VERSION}-win-x64/LICENSE" release/runtime/NODE-LICENSE.txt

          cp -r backend/dist release/backend/dist
          cp backend/package.json backend/package-lock.json release/backend/
          npm ci --omit=dev --prefix release/backend

          cp -r frontend/dist release/frontend/dist
          cp -r config release/config
          cp "Start Vantage.bat" release/
          cp README.md release/
          printf 'GROQ_API_KEY=%s\nAI_DATA_CONSENT=true\n' "$GROQ_API_KEY" > release/.env

      - name: Create ZIP and checksum
        if: steps.check.outputs.proceed == 'true'
        run: |
          cd release
          zip -r "../vantage-${{ steps.version.outputs.tag }}.zip" .
          cd ..
          sha256sum "vantage-${{ steps.version.outputs.tag }}.zip" > "vantage-${{ steps.version.outputs.tag }}.zip.sha256"

      - name: Publish GitHub Release
        if: steps.check.outputs.proceed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Vantage ${{ steps.version.outputs.tag }}
          files: |
            vantage-${{ steps.version.outputs.tag }}.zip
            vantage-${{ steps.version.outputs.tag }}.zip.sha256
          generate_release_notes: true
          body: |
            ## Download Vantage ${{ steps.version.outputs.tag }}

            1. Download **`vantage-${{ steps.version.outputs.tag }}.zip`**
            2. Optionally verify it against the included `.sha256` checksum
            3. Extract the ZIP completely
            4. Double-click **`Start Vantage.bat`**
            5. Complete the first-run setup wizard

            No Node.js, Docker, installer, or packed executable is required. The release
            contains the official Node.js Windows runtime and normal application files.
            AI features work out of the box — no extra setup needed.

            ### Or install as a desktop app
            Download **`Vantage-Setup-${{ steps.version.outputs.tag }}.exe`** for a proper Windows installer
            with a Start Menu shortcut and system-tray integration.

  electron:
    runs-on: windows-latest
    needs: release
    if: needs.release.outputs.tag != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          printf 'VITE_API_URL=\nVITE_API_KEY=\n' > .env
          npm run build

      - name: Package Electron installer
        working-directory: electron
        shell: bash
        run: |
          npm install
          npm version "${NEEDS_TAG#v}" --no-git-tag-version
          npm run dist
        env:
          NEEDS_TAG: ${{ needs.release.outputs.tag }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            electron/dist/*.exe
            electron/dist/*.blockmap
            electron/dist/latest.yml
